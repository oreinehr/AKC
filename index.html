<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Alessandro Kuhn Contes — Creative Director</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="description" content="Creative Director and UX Designer working between Brazil and the United States. Twenty years calibrating creative across two cultures." />
<meta property="og:title" content="Alessandro Kuhn Contes — Creative Director" />
<meta property="og:description" content="Creative Director and UX Designer. Brand, UX, and creative leadership across enterprise platforms." />
<meta property="og:type" content="website" />
<link rel="icon" href="assets/akc_logo_white.svg" type="image/svg+xml" />
<link rel="stylesheet" href="colors_and_type.css" />
<link rel="stylesheet" href="wireframe-styles.css" />
<style>
  html, body { margin: 0; padding: 0; }
</style>
</head>
<body>
<div id="root"></div>

<script>window.__skipAppMount = true;</script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>


<script src="image-slot.js"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="case-study.jsx"></script>
<script type="text/babel" src="blog-post.jsx"></script>
<script type="text/babel" src="about-contact.jsx"></script>
<script type="text/babel" src="archives.jsx"></script>
<script type="text/babel" src="app.jsx"></script>

<script type="text/babel">
function App() {
  const [data, setData] = useStore();
  const dark    = data.dark !== false;
  const setDark = (v) => setData((s) => ({ ...s, dark: !!v }));
  const lang    = data.lang || "en";
  const setLang = (v) => setData((s) => ({ ...s, lang: v }));
  const { mobile, tablet } = useBreakpoint();
  const navigate = {
    openCase: (slug) => { if (slug) window.location.href = `case-study.html?slug=${slug}`; },
    openPost: (slug) => { if (slug) window.location.href = `blog-post.html?slug=${slug}`; },
  };
  return (
    <VariationB
      data={data}
      dark={dark} setDark={setDark}
      lang={lang} setLang={setLang}
      mobile={mobile} tablet={tablet}
      navigate={navigate}
      activeCaseSlug={data.activeCaseSlug}
      activePostSlug={data.activePostSlug}
    />
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
